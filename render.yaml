# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo in Render Dashboard → New → Blueprint
services:
  - type: web
    name: portfolio-dashboard-agent
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --max-requests 300 --max-requests-jitter 50 main:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      # Cap glibc malloc arenas and trim freed memory back to the OS more
      # aggressively. The long-lived worker churns large pandas DataFrames via
      # the 300s background sync loop; without this, freed native buffers stay
      # in per-thread arenas and RSS ramps to saturation (see memory analysis).
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: MALLOC_TRIM_THRESHOLD_
        value: "65536"
      - key: FLASK_DEBUG
        value: "0"
      - key: SKIP_TRANSFORMERS
        value: "1"
      - key: ASSESSMENT_MODE
        value: auto
      - key: FIB_PROXIMITY_PCT
        value: "1.0"
      - key: TARGET_REFRESH_CYCLES
        value: "12"
      - key: FIB_CACHE_MAX_ENTRIES
        value: "64"
      - key: YFINANCE_INFO_CACHE_MAX_ENTRIES
        value: "48"
      # DATABASE_URL is managed manually in the service's Environment tab — it
      # points at the separately-provisioned Render Postgres instance
      # "Portfolio-Dashboard-Agent-DB" (use its Internal Database URL).
      # sync: false tells the Blueprint not to manage/overwrite the value.
      - key: DATABASE_URL
        sync: false
      # Mark the session cookie Secure (Render serves HTTPS).
      - key: SESSION_COOKIE_SECURE
        value: "1"
      # Auth secrets — set in the Render dashboard (never commit secrets):
      #   SESSION_SECRET           (long random string)
      #   GOOGLE_OAUTH_CLIENT_ID, GOOGLE_OAUTH_CLIENT_SECRET
      #   OAUTH_REDIRECT_URI=https://<your-service>.onrender.com/auth/callback
      #   ALLOWED_EMAILS           (optional sign-in allowlist)
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: OAUTH_REDIRECT_URI
        sync: false
      # Commercialization Phase A (optional — defaults are on):
      #   DEDUP_BASE_ASSESSMENT=1, DAILY_ASSESSMENT_WORKER=1
      #   SYMBOL_MARKET_FUNDAMENTALS=1
      # Other optional keys (set in dashboard):
      # LLM_PROVIDER, OPENAI_API_KEY, GEMINI_API_KEY, FINNHUB_API_KEY
